<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oryx Group - Global Partner Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 400px; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin: auto; }
        .logo { color: #1b5e20; font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        label { font-size: 13px; color: #555; font-weight: 600; display: block; margin-top: 10px; }
        select, input { width: 100%; padding: 12px; margin: 5px 0 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #1b5e20; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #144d1a; }
        #resBox { margin-top: 25px; padding: 20px; background: #e8f5e9; border-radius: 15px; display: none; text-align: center; border: 1px solid #c8e6c9; }
        .loading { font-size: 14px; color: #1b5e20; display: none; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">Oryx Group</div>
    
    <label>Choose Your Local Currency:</label>
    <select id="curr">
        <option value="USD">USD ($) - US Dollar</option>
        <option value="BDT" selected>BDT (৳) - Bangladeshi Taka</option>
        <option value="EUR">EUR (€) - Euro</option>
        <option value="GHS">GHS (₵) - Ghanaian Cedi</option>
        <option value="AFN">AFN (؋) - Afghan Afghani</option>
        <option value="INR">INR (₹) - Indian Rupee</option>
        <option value="AED">AED (د.إ) - UAE Dirham</option>
        <option value="SAR">SAR (﷼) - Saudi Riyal</option>
        <option value="GBP">GBP (£) - British Pound</option>
        <option value="TRY">TRY (₺) - Turkish Lira</option>
        <option value="CAD">CAD ($) - Canadian Dollar</option>
        <option value="AUD">AUD ($) - Australian Dollar</option>
        <option value="MYR">MYR (RM) - Malaysian Ringgit</option>
        <option value="PKR">PKR (₨) - Pakistani Rupee</option>
        <option value="OMR">OMR (﷼) - Oman Rial</option>
        <option value="QAR">QAR (﷼) - Qatari Riyal</option>
        <option value="SGD">SGD ($) - Singapore Dollar</option>
        <option value="ZAR">ZAR (R) - South African Rand</option>
        <option value="NGN">NGN (₦) - Nigerian Naira</option>
        <option value="JPY">JPY (¥) - Japanese Yen</option>
        <option value="CNY">CNY (¥) - Chinese Yuan</option>
        <option value="KWD">KWD (د.ك) - Kuwaiti Dinar</option>
        <option value="BHD">BHD (.د.ب) - Bahraini Dinar</option>
        <option value="RUB">RUB (₽) - Russian Ruble</option>
        <option value="NPR">NPR (₨) - Nepalese Rupee</option>
    </select>

    <label>Order ID:</label>
    <input type="text" id="uId" placeholder="e.g. PEN-101">

    <label>Quantity (Units):</label>
    <input type="number" id="uQty" placeholder="How many units?">

    <label>Sale Price (Per Unit in your currency):</label>
    <input type="number" id="uPrice" step="0.0001" placeholder="Enter sale price">

    <button onclick="calculate()">Calculate My 15% Share</button>
    <div id="loading" class="loading">Fetching live exchange rates...</div>

    <div id="resBox">
        <span style="font-size: 14px; color: #666;">Total Estimated Commission (15%):</span>
        <h2 id="finalAmount" style="color: #2e7d32; margin: 5px 0;"></h2>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        databaseURL: "https://oryx-partner-database-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    async function calculate() {
        const id = document.getElementById('uId').value;
        const selectedCurr = document.getElementById('curr').value;
        const qty = parseInt(document.getElementById('uQty').value);
        const salePrice = parseFloat(document.getElementById('uPrice').value);

        if(!id || isNaN(qty) || isNaN(salePrice)) {
            alert("সবগুলো তথ্য সঠিকভাবে দিন।");
            return;
        }

        // ক্লাউড থেকে সরাসরি ডাটা চেক করবে
        database.ref('costs/' + id).once('value').then(async (snapshot) => {
            if (!snapshot.exists()) {
                alert("এই Order ID টি ক্লাউডে খুঁজে পাওয়া যায়নি। অ্যাডমিনের সাথে যোগাযোগ করুন।");
                return;
            }

            const costData = snapshot.val();
            
            try {
                // লাইভ কারেন্সি কনভার্ট করা
                const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${costData.currency}`);
                const data = await res.json();
                const rate = data.rates[selectedCurr];

                const costInUserCurr = costData.amount * rate;
                const profit = (salePrice - costInUserCurr) * qty;
                const share = profit * 0.15;
                
                const finalShare = selectedCurr + " " + share.toLocaleString(undefined, {minimumFractionDigits: 2});
                
                document.getElementById('resBox').style.display = 'block';
                document.getElementById('finalAmount').innerText = finalShare;

                // চাইলে পার্টনারের ক্যালকুলেশন হিস্ট্রিও ক্লাউডে সেভ রাখতে পারেন
                database.ref('activity_logs/').push({
                    orderId: id,
                    share: finalShare,
                    time: new Date().toLocaleString()
                });

            } catch (e) { 
                alert("লাইভ কারেন্সি রেট আনতে সমস্যা হচ্ছে। ইন্টারনেট চেক করুন।"); 
            }
        });
    }
                    </script>
</body>
</html>
