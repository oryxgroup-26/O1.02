
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oryx Group - Admin Master Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .container { max-width: 950px; margin: auto; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h2, h3 { color: #4caf50; margin-top: 0; }
        label { font-size: 13px; color: #aaa; display: block; margin-top: 10px; }
        select, input { background: #2c2c2c; border: 1px solid #444; color: white; padding: 12px; margin: 8px 0; width: 100%; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        button { background: #4caf50; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #45a049; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #252525; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; font-size: 14px; }
        th { background: #333; color: #4caf50; }
        .refresh-btn { background: #2196f3; width: auto; padding: 10px 20px; margin-bottom: 10px; }
        .time-text { color: #888; font-size: 12px; }
        .cost-badge { background: #2e7d32; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Oryx Group Admin Control</h2>
        
        <div class="card">
            <h3>Set Production Cost (Global Currency)</h3>
            
            <label>Select Cost Currency:</label>
            <select id="adminCostCurr">
                <option value="BDT">BDT (৳) - Bangladesh</option>
                <option value="USD" selected>USD ($) - USA</option>
                <option value="EUR">EUR (€) - Euro</option>
                <option value="GHS">GHS (₵) - Ghana</option>
                <option value="INR">INR (₹) - India</option>
                <option value="AFN">AFN (؋) - Afghanistan</option>
                <option value="GBP">GBP (£) - UK</option>
                <option value="AED">AED (د.إ) - UAE</option>
                <option value="SAR">SAR (﷼) - Saudi</option>
                </select>

            <label>Order ID:</label>
            <input type="text" id="orderId" placeholder="e.g. PEN-101">

            <label>Production Cost (Per unit):</label>
            <input type="number" id="costAmount" step="0.0001" placeholder="Enter cost amount">

            <button onclick="saveCost()">Save Secret Cost</button>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Partner Activity Log</h3>
                <button class="refresh-btn" onclick="loadActivity()">Refresh Log</button>
            </div>
            <table id="activityTable">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Order ID</th>
                        <th>User Currency</th>
                        <th>Qty</th>
                        <th>Sale Price</th>
                        <th>Partner Share (15%)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        // খরচ সেভ করার ফাংশন
        function saveCost() {
            let id = document.getElementById('orderId').value;
            let amount = document.getElementById('costAmount').value;
            let curr = document.getElementById('adminCostCurr').value;

            if(id && amount) {
                let costData = {
                    amount: parseFloat(amount),
                    currency: curr
                };
                // "cost_ID" কি-তে অবজেক্ট আকারে ডাটা সেভ হবে
                localStorage.setItem("cost_" + id, JSON.stringify(costData));
                alert("Cost saved: " + amount + " " + curr + " for ID: " + id);
            } else {
                alert("Please fill all fields.");
            }
        }

        // লজিক: ইউজার প্যানেল এখন এই কারেন্সি ডাটা ব্যবহার করে হিসাব করবে
        function loadActivity() {
            let tbody = document.querySelector("#activityTable tbody");
            tbody.innerHTML = "";
            let log = JSON.parse(localStorage.getItem("activityLog") || "[]");
            
            log.reverse().forEach(entry => {
                tbody.innerHTML += `
                    <tr>
                        <td class="time-text">${entry.time || 'N/A'}</td>
                        <td><b>${entry.id}</b></td>
                        <td><span class="cost-badge">${entry.currency}</span></td>
                        <td>${entry.qty}</td>
                        <td>${entry.price}</td>
                        <td style="color:#4caf50; font-weight:bold;">${entry.share}</td>
                    </tr>`;
            });
        }

        window.onload = loadActivity;
    </script>
</body>
</html>
